<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Scene - Left and Right Models</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>

    <a-scene>
        
        <a-assets>
            <a-asset-item id="model-left" src="cinnamoroll.glb"></a-asset-item>
            <a-asset-item id="model-right" src="unu.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#ECECEC"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>

        <a-gltf-model 
            src="#model-left" 
            position="-2.5 0 -4" 
            scale="1 1 1">
        </a-gltf-model>

        <a-gltf-model 
            src="#model-right" 
            position="2.5 0 -4" 
            scale="1 1 1">
        </a-gltf-model>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

</body>
</html>
