<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame 3D Scene - Virtual Coordinates</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <a-scene background="color: #ECECEC">
        
        <a-assets>
            <a-asset-item id="model-left" src="cinnamoroll.glb"></a-asset-item>
            <a-asset-item id="model-right" src="sunna_zzz.glb"></a-asset-item>
        </a-assets>

        <a-entity id="rig" position="0 0 0">
            <a-camera position="0 1.6 0"></a-camera>
        </a-entity>

        <a-entity 
            gltf-model="#model-left" 
            position="-3 1.2 -4" 
            scale="1 1 1"
            rotation="0 45 0">
        </a-entity>

        <a-entity 
            gltf-model="#model-right" 
            position="3 1.2 -4" 
            scale="1 1 1"
            rotation="0 -45 0">
        </a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#E8D7F1"></a-plane>

        <a-entity type="ambient" color="#FFF"></a-entity>
        <a-entity type="directional" color="#EEE" position="-1 2 1"></a-entity>

    </a-scene>

</body>
</html>
